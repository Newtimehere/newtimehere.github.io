<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {

      font-weight: 300;
    }
    
    /* BARRA BLANCA ARRIBA */
    .header {
      background: #fff;
      color: #000;
      padding: 14px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: fixed;
      width: 100%;
      top: 0;
      z-index: 1000;
    }
    
    .logo-header {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    
    .logo-header img {
      height: 32px;
      width: auto;
    }
    
    .logo-header span {
      font-size: 18px;
      letter-spacing: 2.5px;
      font-weight: 400;
      color: #000;
      font-family: Georgia, 'Times New Roman', serif;
    }
    
    .menu-btn { 
      font-size: 26px; 
      background: none;
      border: none;
      cursor: pointer;
      color: #000;
      line-height: 1;
      padding: 0;
    }

      padding: 90px 20px 140px 20px;
      background: #000;
      min-height: 100vh;
    }

      margin: 20px 0 35px 0;
    }

      width: auto;
      filter: brightness(0) invert(1);
    }
