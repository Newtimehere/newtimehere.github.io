<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>New Time</title>
  <link rel="icon" type="image/webp" href="logo.webp">
  
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body { 
      background: #000; 
      color: #fff; 
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-weight: 300;
    }
    
    /* BARRA BLANCA - SOLO ESCUDO */
    .header {
      background: #ffffff;
      padding: 8px 20px 8px 8px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: fixed;
      width: 100%;
      top: 0;
      z-index: 9999;
      height: 58px;
      border-bottom: 1px solid #e5e5e5;
    }
    
    .logo-header img {
      height: 44px;
      width: auto;
      display: block;
    }
    
    .menu-btn { 
      font-size: 28px; 
      background: none;
      border: none;
      cursor: pointer;
      color: #000;
      padding: 0;
      line-height: 1;
    }
    
    /* CONTENIDO NEGRO */
    .content {
      padding: 88px 20px 140px 20px;
      background: #000;
      min-height: 100vh;
    }
    
    /* LOGO GRANDE EN EL FONDO NEGRO */
    .main-logo {
      text-align: center;
      margin: 25px 0 35px 0;
    }
    
    .main-logo img {
      max-width: 280px;
      width: 80%;
      height: auto;
      display: block;
      margin: 0 auto;
    }
    
    .intro {
      line-height: 1.7;
      margin: 0 auto 25px auto;
      font-size: 16px;
      font-weight: 300;
      text-align: center;
      max-width: 600px;
      padding: 0 10px;
    }
    
    .divider {
      margin: 35px 0;
      font-size: 16px;
      letter-spacing: 2px;
      text-align: center;
      font-weight: 300;
    }
    
    .directory {
      margin: 40px auto 0 auto;
      max-width: 600px;
      padding: 0 10px;
    }
    
    .directory h2 {
      font-size: 36px;
      margin-bottom: 28px;
      font-weight: 400;
    }
    
    .directory ul { list-style: none; }
    
    .directory li {
      margin: 20px 0;
      font-size: 17px;
      font-weight: 300;
      display: flex;
    }
    
    .directory li:before {
      content: "›";
      margin-right: 15px;
      font-size: 20px;
    }
    
    .downloads {
      margin-top: 45px;
    }
    
    .downloads a {
      display: block;
      color: #d66;
      text-decoration: none;
      margin: 24px 0;
      font-size: 16px;
      font-weight: 300;
    }
    
    .downloads a:before {
      content: "↓ ";
      margin-right: 8px;
    }
    
    .downloads a:hover { color: #f88; }
    
    .cookie-banner {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: #1c1c1e;
      padding: 20px;
      z-index: 9998;
    }
    
    .cookie-text {
      font-size: 15px;
      line-height: 1.5;
      margin-bottom: 16px;
      font-weight: 300;
    }
    
    .cookie-buttons {
      display: flex;
      gap: 12px;
    }
    
    .cookie-buttons button {
      flex: 1;
      padding: 13px;
      border: none;
      font-size: 16px;
      cursor: pointer;
      border-radius: 8px;
      font-weight: 400;
    }
    
    .accept-necessary { background: #fff; color: #000; }
    .accept-all { background: #007aff; color: #fff; }
