    .logo-header img {
      height: 44px;
      width: auto;
      display: block;
      margin-left: 0;
    }
    
    .menu-btn {

      margin: 20px 0;

      font-weight: 300;

    }
    
    .directory li:before {
      content: "›";
      margin-right: 15px;
      font-size: 20px;
    }
    
    .downloads {
      margin-top: 45px;
    }
    
    .downloads a {

      text-decoration: none;
      margin: 24px 0;
      font-size: 16px;
      font-weight: 300;
    }
    
    .downloads a:before {
      content: "↓ ";
      margin-right: 8px;
    }
    
    .downloads a:hover { color: #f88; }
    
    .cookie-banner {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: #1c1c1e;
      padding: 20px;
    }
