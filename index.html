<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>New Time</title>
  
  <!-- FAVICON: Logo que sale en Google -->
  <link rel="icon" type="image/png" sizes="32x32" href="logo.png">
  <link rel="icon" type="image/png" sizes="192x192" href="logo.png">
  <link rel="apple-touch-icon" href="logo.png">
  
  <!-- META TAGS PARA GOOGLE -->
  <meta name="description" content="New Time - Founded this year. Full transparency and direct answers.">
  <meta property="og:title" content="New Time">
  <meta property="og:site_name" content="New Time">
  <meta property="og:image" content="https://newtimehere.github.io/logo.png">
  
  <!-- STRUCTURED DATA PARA EL LOGO -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Organization",
    "name": "New Time",
    "url": "https://newtimehere.github.io",
    "logo": "https://newtimehere.github.io/logo.png"
  }
  </script>
  
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body { 
      background: #000; 
      color: #fff; 
      font-family: Georgia, 'Times New Roman', serif;
      line-height: 1.6;
    }
    
    .header {
      background: #fff;
      color: #000;
      padding: 15px 5%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid #ddd;
    }
    
    .logo-header {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 20px;
      letter-spacing: 5px;
      font-weight: 300;
    }
    
    .logo-header img {
      height: 40px;
      width: auto;
    }
    
    .menu-btn { 
      font-size: 28px; 
      background: none;
      border: none;
      cursor: pointer;
    }
    
    .content {
      padding: 40px 5% 120px 5%;
      text-align: center;
      max-width: 1200px;
      margin: 0 auto;
    }
    
    .main-logo {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 15px;
      margin: 30px 0 40px 0;
      flex-wrap: wrap;
    }
    
    .main-logo img {
      height: 50px;
      width: auto;
    }
    
    .main-logo span {
      font-size: 32px;
      letter-spacing: 8px;
      font-weight: 300;
    }
    
    .intro {
      line-height: 1.8;
      margin: 20px auto;
      font-size: 17px;
      max-width: 650px;
      font-weight: 300;
    }
    
    .divider {
      margin: 40px 0;
      font-size: 16px;
      letter-spacing: 4px;
    }
    
    .directory {
      text-align: left;
      margin: 50px auto 0 auto;
      max-width: 650px;
    }
    
    .directory h2 {
      font-size: 36px;
      margin-bottom: 25px;
      font-weight: 300;
    }
    
    .directory ul { list-style: none; }
    
    .directory li {
      margin: 20px 0;
      font-size: 19px;
      font-weight: 300;
    }
    
    .directory li:before {
      content: "› ";
      margin-right: 10px;
    }
    
    .directory a { 
      color: #fff; 
      text-decoration: none;
      word-break: break-word;
    }
    
    .directory a:hover { text-decoration: underline; }
    
    .cookie-banner {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: #1a1a1a;
      padding: 20px 5%;
      border-top: 1px solid #333;
    }
    
    .
