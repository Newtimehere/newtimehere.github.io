<!DOCTYPE html>

    <title>New Time</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a0a;
            color: #ffffff;
            line-height: 1.6;
        }
        
        .header {
            background: #ffffff;
            padding: 16px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        
        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            color: #0a0a0a;
            font-size: 18px;
            letter-spacing: 2px;
        }
        
        .logo img {
            height: 40px;
        }
        
        .menu-btn {
            background: none;
            border: none;
            cursor: pointer;
            padding: 5px;
        }
        
        .menu-btn span {
            display: block;
            width: 25px;
            height: 2px;
            background: #0a0a0a;
            margin: 5px 0;
        }
        
        .directory {
            max-width: 600px;
            margin: 0 auto;
            padding: 20px 0;
        }
        
        .directory-item {
            list-style: none;
            border-bottom: 1px solid #2a2a2a;
        }
        
        .directory-link {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            color: #ffffff;
            text-decoration: none;
            font-size: 16px;
            transition: background 0.2s;
        }
        
        .directory-link:hover {
            background: #1a1a1a;
        }
        
        .directory-link-text {
            flex: 1;
        }
        
        .directory-arrow {
            width: 20px;
            height: 20px;
            opacity: 0.5;
        }
        
        .footer-logo {
            text-align: center;
            padding: 40px 20px;
            opacity: 0.3;
        }
        
        .footer-logo img {
            height: 30px;
        }
    </style>
</head>
